{% extends "base.html" %}
{% block title %}Search — ByteMart{% endblock %}
{% block content %}
<h2>Search products</h2>
<form method="get">
  <label>Query</label>
  <input type="text" name="q" value="{{ q }}">
  <button type="submit">Search</button>
</form>

<p style="margin-top:20px;">Results for: {{ q|safe }}</p>

<table>
  <tr><th>Name</th><th>Description</th><th>Price</th></tr>
  {% for r in results %}
  <tr><td>{{ r['name'] }}</td><td>{{ r['description'] }}</td><td>${{ r['price'] }}</td></tr>
  {% endfor %}
</table>
{% endblock %}
