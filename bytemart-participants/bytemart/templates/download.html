{% extends "base.html" %}
{% block title %}Reports — ByteMart{% endblock %}
{% block content %}
<h2>Invoice reports</h2>
<form method="get">
  <label>File</label>
  <input type="text" name="file" value="{{ filename }}">
  <button type="submit">Open</button>
</form>
<h2 style="margin-top:26px;">{{ filename }}</h2>
<pre class="console">{{ content }}</pre>
{% endblock %}
